<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AgroDoc AI — Admin Dashboard</title>
<style>
:root{--g1:#050e07;--g2:#0a1f10;--lime:#6ee569;--gold:#f5c518;--red:#f87171;--blue:#60a5fa;--card:rgba(255,255,255,.04);--border:rgba(110,229,105,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--g1);color:#e8f5e9;font-family:'Segoe UI',sans-serif;min-height:100vh}
.hdr{background:var(--g2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-size:17px;font-weight:800;color:var(--lime);display:flex;align-items:center;gap:8px}
.inp{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:#e8f5e9;font-size:14px;outline:none;margin-bottom:10px;font-family:inherit}
.btn{background:linear-gradient(135deg,#15803d,#22c55e);color:#071209;border:none;padding:12px;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer;width:100%;font-family:inherit;transition:all .2s}
.btn:hover{transform:translateY(-1px)}
.rbtn{background:transparent;border:1px solid var(--border);color:#3d6b4a;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s}
.rbtn:hover{color:var(--lime);border-color:var(--lime)}
.login-box{background:var(--g2);border:1px solid var(--border);border-radius:18px;padding:36px;max-width:380px;margin:80px auto}
.dash{padding:20px 24px;display:none}
.dash.on{display:block}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;text-align:center}
.sn{font-size:30px;font-weight:900;line-height:1;margin-bottom:4px}
.sl{font-size:10px;color:#3d6b4a;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.stitle{font-size:11px;font-weight:700;color:var(--lime);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px}
.rrow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(110,229,105,.05)}
.rrow:last-child{border-bottom:none}
.rtag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px}
.rtag.d{background:rgba(245,197,24,.1);color:var(--gold)}
.rtag.v{background:rgba(96,165,250,.1);color:var(--blue)}
.apbtn{background:rgba(110,229,105,.08);border:1px solid rgba(110,229,105,.25);color:var(--lime);padding:4px 10px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.apbtn.done{opacity:.6;cursor:default}
.dbar{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dn{font-size:12px;width:150px;flex-shrink:0;color:#b7e4c7}
.dbg{flex:1;background:rgba(255,255,255,.05);border-radius:4px;height:7px}
.df{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--lime),#a8ff6b);transition:width .6s ease}
.dc{font-size:11px;color:#3d6b4a;width:24px;text-align:right;flex-shrink:0}
.dot{width:8px;height:8px;border-radius:50%;background:var(--lime);display:inline-block;margin-right:5px;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);border-radius:10px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-bottom:10px;display:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.grid2{grid-template-columns:1fr}}
.spill{font-size:11px;background:rgba(110,229,105,.06);border:1px solid var(--border);border-radius:16px;padding:4px 10px;display:inline-block;margin:2px}
.health-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(110,229,105,.05);font-size:13px}
.health-row:last-child{border-bottom:none}
.hval{color:var(--lime);font-weight:700}
</style>
</head>
<body>

<div class="hdr">
  <div class="logo">🌿 AgroDoc AI Admin</div>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="st" style="font-size:12px;color:#3d6b4a"></span>
    <button class="rbtn" onclick="loadData()">🔄 Refresh</button>
    <button class="rbtn" onclick="doLogout()">Logout</button>
  </div>
</div>

<!-- LOGIN -->
<div id="ls">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:44px;margin-bottom:10px">🌿</div>
      <div style="font-size:19px;font-weight:800;color:#6ee569">AgroDoc AI</div>
      <div style="font-size:13px;color:#3d6b4a;margin-top:4px">Admin Dashboard</div>
    </div>
    <div class="err" id="le">Wrong key or URL. Please check and try again.</div>
    <input class="inp" type="url" id="bu" placeholder="Backend URL — https://agrodoc-ai.onrender.com"/>
    <input class="inp" type="password" id="ak" placeholder="Admin Key"/>
    <button class="btn" onclick="doLogin()">🔑 Enter Dashboard</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="ds">
  <div class="stats">
    <div class="sc"><div class="sn" style="color:#6ee569" id="sd">—</div><div class="sl">Diagnoses</div></div>
    <div class="sc"><div class="sn" style="color:#f5c518" id="ss">—</div><div class="sl">Sessions</div></div>
    <div class="sc"><div class="sn" style="color:#60a5fa" id="sr">—</div><div class="sl">Registrations</div></div>
    <div class="sc"><div class="sn" style="color:#a78bfa" id="sf">—</div><div class="sl">Feedback</div></div>
    <div class="sc"><div class="sn" style="color:#6ee569" id="su">—</div><div class="sl">Uptime</div></div>
    <div class="sc"><div class="sn" style="color:#f5c518" id="sm">—</div><div class="sl">Memory MB</div></div>
  </div>

  <!-- Registrations -->
  <div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="stitle" style="margin-bottom:0">📋 Dealer & Vet Registrations</div>
      <div id="rc" style="font-size:11px;color:#3d6b4a"></div>
    </div>
    <div id="rl"><div style="text-align:center;color:#3d6b4a;padding:20px;font-size:13px">Loading...</div></div>
  </div>

  <div class="grid2">
    <!-- Top diseases -->
    <div class="section">
      <div class="stitle">🦠 Top Diseases Diagnosed</div>
      <div id="dl"></div>
    </div>

    <!-- System health -->
    <div class="section">
      <div class="stitle">⚙️ System Health</div>
      <div id="hl">Checking...</div>
    </div>
  </div>

  <!-- Active States -->
  <div class="section">
    <div class="stitle">📍 Farmer Locations</div>
    <div id="sll" style="color:#3d6b4a;font-size:13px">No data yet</div>
  </div>
</div>

<script>
let B='',K='';
function doLogin(){
  B=(document.getElementById('bu').value||'').trim().replace(/\/$/,'');
  K=document.getElementById('ak').value.trim();
  if(!B||!K){showErr('Please fill in both fields');return;}
  localStorage.setItem('adab',B);
  loadData();
}
function doLogout(){
  document.getElementById('ls').style.display='block';
  document.getElementById('ds').classList.remove('on');
  K='';
}
function showErr(m){const e=document.getElementById('le');e.textContent=m;e.style.display='block';setTimeout(()=>e.style.display='none',4000);}

async function loadData(){
  if(!B){B=localStorage.getItem('adab')||'';if(!B)return;}
  document.getElementById('ls').style.display='none';
  document.getElementById('ds').classList.add('on');
  document.getElementById('st').innerHTML='<span class="dot"></span>Loading...';

  // Health
  try{
    const h=await(await fetch(`${B}/health`)).json();
    document.getElementById('sd').textContent=h.total_diagnoses||0;
    document.getElementById('ss').textContent=h.sessions_active||0;
    document.getElementById('sf').textContent=h.feedback_count||0;
    document.getElementById('su').textContent=h.uptime_seconds?Math.round(h.uptime_seconds/60)+'m':'—';
    document.getElementById('sm').textContent=h.memory_mb||'—';
    document.getElementById('hl').innerHTML=`
      <div class="health-row"><span>Status</span><span class="hval">🟢 LIVE</span></div>
      <div class="health-row"><span>Version</span><span class="hval">${h.version||'3.0.0'}</span></div>
      <div class="health-row"><span>AI Engine</span><span class="hval">${h.ai_configured?'✅ Connected':'❌ Not set'}</span></div>
      <div class="health-row"><span>WhatsApp</span><span class="hval">${h.whatsapp_configured?'✅ Live':'⏳ Pending'}</span></div>
      <div class="health-row"><span>Cache</span><span class="hval">${h.cache_version||'—'}</span></div>
      <div class="health-row"><span>Checked</span><span class="hval">${new Date().toLocaleTimeString('en-NG')}</span></div>
    `;
    document.getElementById('st').innerHTML='<span class="dot"></span>Online';
  }catch(e){
    document.getElementById('hl').innerHTML='<span style="color:#f87171">❌ Cannot reach backend</span>';
    document.getElementById('st').innerHTML='<span style="width:8px;height:8px;border-radius:50%;background:#f87171;display:inline-block;margin-right:5px"></span>Offline';
  }

  // Registrations
  try{
    const rd=await(await fetch(`${B}/api/registrations`,{headers:{'X-Admin-Key':K}})).json();
    document.getElementById('sr').textContent=rd.total||0;
    document.getElementById('rc').textContent=`${rd.pending||0} pending · ${rd.approved||0} approved`;
    const regs=rd.registrations||[];
    document.getElementById('rl').innerHTML=regs.length===0
      ?'<div style="text-align:center;color:#3d6b4a;padding:20px;font-size:13px">No registrations yet. Share the app with dealers and vets!</div>'
      :regs.map(r=>`
        <div class="rrow">
          <div class="rtag ${r.type==='vet'?'v':'d'}">${r.type==='vet'?'🐄 Vet':'🏪 Dealer'}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.businessName}</div>
            <div style="font-size:11px;color:#3d6b4a">📍 ${r.stateLGA} · ${(r.services||'').slice(0,30)}...</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:12px;color:#6ee569">${r.contactPhone||r.phone||''}</div>
            <div style="font-size:10px;color:#3d6b4a">${new Date(r.submittedAt).toLocaleDateString('en-NG')}</div>
          </div>
          <button class="apbtn ${r.approved?'done':''}" onclick="approveReg('${r.id}',this)" ${r.approved?'disabled':''}>
            ${r.approved?'✅ Done':'Approve'}
          </button>
        </div>
      `).join('');
  }catch(e){
    document.getElementById('rl').innerHTML='<div style="color:#f87171;font-size:12px">❌ Could not load registrations. Check your admin key.</div>';
  }

  // Top diseases (you can wire this to real data later)
  const diseases=[
    {n:'Cassava Mosaic',c:24},{n:'Newcastle Disease',c:18},{n:'Tomato Blight',c:14},
    {n:'Gumboro Disease',c:11},{n:'Columnaris (Fish)',c:8},{n:'PPR (Goats)',c:6},{n:'Maize Streak',c:5}
  ];
  const mx=Math.max(...diseases.map(d=>d.c));
  document.getElementById('dl').innerHTML=diseases.map(d=>`
    <div class="dbar">
      <div class="dn">${d.n}</div>
      <div class="dbg"><div class="df" style="width:${(d.c/mx)*100}%"></div></div>
      <div class="dc">${d.c}</div>
    </div>
  `).join('');

  // States
  const states=['Lagos','Kano','Oyo','Anambra','FCT','Delta','Benue','Rivers','Plateau','Kaduna'];
  document.getElementById('sll').innerHTML=states.map(s=>`<span class="spill">📍 ${s}</span>`).join('');
}

async function approveReg(id,btn){
  try{
    const r=await fetch(`${B}/api/registrations/${id}/approve`,{method:'POST',headers:{'X-Admin-Key':K}});
    if(r.ok){btn.textContent='✅ Done';btn.classList.add('done');btn.disabled=true;}
  }catch(e){alert('Could not approve. Check connection.');}
}

window.onload=()=>{
  const saved=localStorage.getItem('adab');
  if(saved)document.getElementById('bu').value=saved;
};
</script>
</body>
</html>
